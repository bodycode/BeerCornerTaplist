<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Live PDF View</title>
  <style>
    body { margin:0; background:#111; color:#eee; font-family:Arial, sans-serif; }
    header { padding:12px 16px; background:#1b1b1b; border-bottom:1px solid #333; }
    iframe { width:100%; height:calc(100vh - 56px); border:0; display:block; }
    .status { font-size:0.95rem; color:#9ca3af; }
  </style>
</head>
<body>
  <header>
    <strong>Live PDF Display</strong>
    <span class="status" id="status">Connecting...</span>
  </header>
  <iframe id="pdf" src="outputs/latest.pdf" title="Live PDF"></iframe>

  <script>
    const iframe = document.getElementById('pdf');
    const status = document.getElementById('status');
    const pdfUrl = 'outputs/latest.pdf';
    const WS_SERVER = ''; // set to 'your-server-host:3000' if the page is hosted separately from the WebSocket backend
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsHost = WS_SERVER || window.location.host;
    const url = protocol + '//' + wsHost;
    let ws;
    let pollTimer;

    function refreshPdf() {
      iframe.src = pdfUrl + '?ts=' + Date.now();
    }

    function startPolling() {
      if (pollTimer) return;
      status.textContent = 'Polling for updates...';
      status.style.color = '#ffc107';
      pollTimer = setInterval(refreshPdf, 15000);
    }

    try {
      ws = new WebSocket(url);
      ws.onopen = () => {
        status.textContent = 'Live updates enabled';
        status.style.color = '#8bc34a';
      };

      ws.onmessage = () => {
        refreshPdf();
      };

      ws.onclose = () => {
        status.textContent = 'Disconnected — polling for changes';
        status.style.color = '#ff9800';
        startPolling();
      };

      ws.onerror = () => {
        status.textContent = 'WebSocket error — polling for changes';
        status.style.color = '#ff9800';
        startPolling();
      };
    } catch (err) {
      status.textContent = 'Unable to use WebSocket — polling for changes';
      status.style.color = '#ff9800';
      startPolling();
    }
  </script>
</body>
</html>
